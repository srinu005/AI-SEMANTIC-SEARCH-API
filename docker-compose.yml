services:
  # 1. The Metadata Store (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: b2b_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: semantic_search
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. The Vector Engine (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: b2b_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  # 3. The Cache & Broker (Redis)
  redis:
    image: redis:alpine
    container_name: b2b_redis
    ports:
      - "6379:6379"

  # 4. The FastAPI Engine
  api:
    build: .
    container_name: b2b_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - qdrant
      - redis
    volumes:
      - .:/app

  # 5. The Background Worker (Celery)
  # This satisfies your "Non-blocking embedding generation"
  worker:
    build: .
    container_name: b2b_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - qdrant
    volumes:
      - .:/app

volumes:
  postgres_data: